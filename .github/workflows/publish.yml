# Tag-only publish to GitHub Packages.
#
# Requires repo secret NODE_AUTH_TOKEN = GitHub PAT with:
#   - read:packages  (install @llanesleonardo/saas-platform)
#   - write:packages (publish this package)
# GITHUB_TOKEN alone cannot read another package in the org by default.
name: Publish package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@llanesleonardo"

      - name: System deps (better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Boundaries
        run: npm run check:boundaries

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke
        run: npm run test:smoke

      - name: Inspect tarball
        run: npm pack --dry-run

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG"

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
